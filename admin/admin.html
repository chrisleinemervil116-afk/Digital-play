<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital-Play 🎮 - Admin Dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../logo.svg" alt="Digital-Play Logo">
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Retour au Site</a></li>
            </ul>
        </nav>
    </header>

    <section id="admin-dashboard">
        <h2>Dashboard Admin</h2>
        <div class="admin-section">
            <h3>Utilisateurs</h3>
            <ul id="users-list">
                <!-- Liste simulée -->
            </ul>
        </div>
        <div class="admin-section">
            <h3>Transactions</h3>
            <ul id="transactions-list">
                <!-- Liste simulée -->
            </ul>
        </div>
        <div class="admin-section">
            <h3>Demandes de Recharge</h3>
            <ul id="recharges-list">
                <!-- Liste simulée -->
                <li>Demande 1 : 500 HTG - <button>Valider</button> <button>Refuser</button></li>
            </ul>
        </div>
        <div class="admin-section">
            <h3>Gérer Produits</h3>
            <form id="add-product">
                <label for="product-name">Nom :</label>
                <input type="text" id="product-name" name="name" required>
                <label for="product-price">Prix (HTG) :</label>
                <input type="number" id="product-price" name="price" required>
                <button type="submit">Ajouter Produit</button>
            </form>
        </div>
        <div class="admin-section">
            <h3>Statistiques</h3>
            <p>Total Utilisateurs : <span id="total-users">0</span></p>
            <p>Total Transactions : <span id="total-transactions">0</span></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Digital-Play. Tous droits réservés.</p>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
