<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital-Play 🎮 - Compte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.svg" alt="Digital-Play Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="products.html">Produits</a></li>
                <li><a href="wallet.html">Wallet</a></li>
                <li><a href="account.html">Compte</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="auth">
        <div id="login-form">
            <h2>Connexion</h2>
            <form id="login">
                <label for="login-email">Email ou Téléphone :</label>
                <input type="text" id="login-email" name="email" required>
                <label for="login-password">Mot de passe :</label>
                <input type="password" id="login-password" name="password" required>
                <button type="submit">Se connecter</button>
            </form>
            <p><a href="#" id="show-register">Créer un compte</a></p>
        </div>
        <div id="register-form" style="display: none;">
            <h2>Inscription</h2>
            <form id="register">
                <label for="reg-nom">Nom :</label>
                <input type="text" id="reg-nom" name="nom" required>
                <label for="reg-email">Email ou Téléphone :</label>
                <input type="text" id="reg-email" name="email" required>
                <label for="reg-password">Mot de passe :</label>
                <input type="password" id="reg-password" name="password" required>
                <button type="submit">S'inscrire</button>
            </form>
            <p><a href="#" id="show-login">Se connecter</a></p>
        </div>
    </section>

    <section id="dashboard" style="display: none;">
        <h2>Dashboard Utilisateur</h2>
        <p>Solde Wallet : <span id="user-solde">0 HTG</span></p>
        <h3>Acheter Produit</h3>
        <p>Redirection vers <a href="products.html">Produits</a></p>
        <h3>Historique Commandes</h3>
        <ul id="commandes-list">
            <!-- Historique simulé -->
        </ul>
        <h3>Historique Recharge</h3>
        <ul id="recharge-list">
            <!-- Historique simulé -->
        </ul>
        <button id="logout">Déconnexion</button>
    </section>

    <footer>
        <p>&copy; 2026 Digital-Play. Tous droits réservés.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
